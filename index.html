<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugo Cuenot - Artist Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: "Times New Roman", Times, serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 25px 50px; background-color: #ffffff; flex-shrink: 0; z-index: 100; }
        h1.site-title { font-family: 'Bebas Neue', sans-serif; font-size: 5.5rem; letter-spacing: 1px; color: #000000; line-height: 0.8; margin-top: 5px; cursor: pointer; }
        nav ul { display: flex; list-style: none; gap: 60px; margin-right: 20px; }
        nav a { text-decoration: none; color: #000000; font-size: 1.1rem; font-weight: 600; transition: opacity 0.2s ease; }
        nav a:hover { opacity: 0.5; }

        .content-area { flex-grow: 1; position: relative; width: 100%; }
        .page-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; opacity: 0; visibility: hidden; transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out; }
        .page-section.active { opacity: 1; visibility: visible; z-index: 10; }

        #home-section { cursor: pointer; }
        #home-section img { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; transition: opacity 0.6s ease-in-out; }
        .fade-out { opacity: 0; }

        .text-content { padding: 50px; max-width: 800px; margin: 0 auto; height: 100%; overflow-y: auto; scrollbar-width: none; }
        .text-content::-webkit-scrollbar { display: none; }
        .text-content h2 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; margin-bottom: 20px; letter-spacing: 1px; }
        .text-content p, .text-content li { font-size: 1.2rem; line-height: 1.6; margin-bottom: 15px; }
        .work-list { list-style: none; }
        .work-list li { border-bottom: 1px solid #ddd; padding: 15px 0; }

        /* --- Shared UI (Texts & Videos) --- */
        .list-link { cursor: pointer; transition: opacity 0.2s ease; }
        .list-link:hover { opacity: 0.5; }
        
        .reader-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #000; padding-bottom: 15px; }
        .action-btn { background: none; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; cursor: pointer; color: #000; text-decoration: none; letter-spacing: 1px; transition: opacity 0.2s ease; }
        .action-btn:hover { opacity: 0.5; }

        /* --- Text Reader UI --- */
        #text-reader-view { display: none; position: relative; }
        .reader-body p { margin-bottom: 25px; text-align: justify; }

        /* --- Video Player UI --- */
        #video-player-view { display: none; position: relative; }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Forces a perfect 16:9 aspect ratio */
            height: 0;
            margin-bottom: 25px;
            background-color: #000; /* Shows black while iframe loads */
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .video-description {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #333;
            text-align: justify;
        }

        /* --- Progress Bar --- */
        #progress-container { position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 100; display: none; }
        #progress-bar { height: 100%; background: #000; width: 0%; transition: width 0.1s; }

        /* --- Back to Top Button --- */
        #back-to-top { position: fixed; bottom: 40px; right: 50px; background: #000; color: #fff; border: none; padding: 10px 20px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 1px; cursor: pointer; opacity: 0; visibility: hidden; transition: opacity 0.3s; z-index: 100; border-radius: 3px; }
        #back-to-top.visible { opacity: 1; visibility: visible; }

        /* =========================================
           RESPONSIVE DESIGN (Media Queries)
           ========================================= */
        @media (max-width: 900px) {
            header { padding: 20px 30px; }
            h1.site-title { font-size: 4.5rem; }
            nav ul { gap: 30px; margin-right: 0; }
            .text-content { padding: 40px 30px; }
        }

        /* SMARTPHONE ADJUSTMENTS */
        @media (max-width: 600px) {
            header { flex-direction: column; align-items: flex-start; padding: 15px 20px; }
            h1.site-title { font-size: 3.5rem; margin-bottom: 15px; }
            nav ul { gap: 15px; flex-wrap: wrap; }
            nav a { font-size: 1rem; }
            
            /* ADDED: 120px of padding to the bottom so the text isn't cut off by mobile browser bars */
            .text-content { padding: 25px 20px 120px 20px; }
            .text-content h2 { font-size: 2.2rem; }
            .text-content p, .text-content li { font-size: 1.1rem; }
            
            .reader-controls { flex-direction: column; align-items: flex-start; gap: 15px; }
            .action-btn { font-size: 1.3rem; }
            #back-to-top { bottom: 20px; right: 20px; padding: 8px 15px; font-size: 1rem; }

            /* ADDED: Logic to rotate the image 90 degrees counter-clockwise safely */
            #home-section {
                overflow: hidden; /* Prevents the rotated image from stretching the screen */
            }
            #portfolioImage {
                /* Calculates the exact height of the phone minus the header (~120px) */
                width: calc(100vh - 120px); 
                height: 100vw;      
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(-90deg);
                /* Ensures the image strictly fills this newly calculated space */
                object-fit: cover; 
            }
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="container">
        <header>
            <h1 class="site-title" onclick="switchPage('home-section')">HUGO CUENOT</h1>
            <nav>
                <ul>
                    <li><a href="#" onclick="switchPage('texts-section')">Texts</a></li>
                    <li><a href="#" onclick="switchPage('videos-section')">Videos</a></li>
                    <li><a href="#" onclick="switchPage('work-section')">Work</a></li>
                    <li><a href="#" onclick="switchPage('about-section')">About</a></li>
                    <li><a href="#" onclick="switchPage('cv-section')">CV</a></li>
                </ul>
            </nav>
        </header>

        <main class="content-area">
            
            <section id="home-section" class="page-section active">
                <img id="portfolioImage" src="images/image_01.webp" alt="Featured Work">
            </section>

            <!-- TEXTS SECTION -->
            <section id="texts-section" class="page-section">
                <div class="text-content" id="texts-list-view">
                    <h2>Selected Texts</h2>
                    <ul class="work-list">
                        <li class="list-link" onclick="openText('text1')"><strong>The Architecture of Memory</strong> - Essay, 2025</li>
                        <li class="list-link" onclick="openText('text2')"><strong>Temporality in Silver Gelatin</strong> - Publication, 2024</li>
                    </ul>
                </div>

                <div class="text-content" id="text-reader-view">
                    <div class="reader-controls">
                        <button class="action-btn" onclick="closeText()">← BACK TO LIST</button>
                        <a id="download-link" href="#" download class="action-btn">DOWNLOAD PDF ↓</a>
                    </div>
                    <h2 id="reader-title">Title Placeholder</h2>
                    <div id="reader-body" class="reader-body"></div>
                    <button id="back-to-top" onclick="scrollToTop()">↑ TOP</button>
                </div>
            </section>

            <!-- VIDEOS SECTION -->
            <section id="videos-section" class="page-section">
                
                <!-- View 1: List of Videos -->
                <div class="text-content" id="videos-list-view">
                    <h2>Selected Videos</h2>
                    <!-- Javascript will automatically build list items here from your JSON file -->
                    <ul class="work-list" id="dynamic-video-list"></ul>
                </div>

                <!-- View 2: Video Player -->
                <div class="text-content" id="video-player-view">
                    <div class="reader-controls">
                        <button class="action-btn" onclick="closeVideo()">← BACK TO LIST</button>
                    </div>
                    <h2 id="video-title">Title</h2>
                    
                    <div class="video-wrapper">
                        <!-- We leave src empty; JS will fill it with the correct video -->
                        <iframe id="vimeo-player" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    
                    <div id="video-description" class="video-description"></div>
                </div>

            </section>

            <section id="work-section" class="page-section"><div class="text-content"><h2>Selected Works</h2></div></section>
            <section id="about-section" class="page-section"><div class="text-content"><h2>About</h2></div></section>
            <section id="cv-section" class="page-section"><div class="text-content"><h2>Curriculum Vitae</h2></div></section>

        </main>
    </div>

    <script>
// --- 1. Slideshow Logic ---
        const images = [
            "images/image_01.webp",
            "images/image_02.webp",
            "images/image_03.webp",
            "images/image_04.webp",
            "images/image_05.webp"
        ];

        // NEW: Preload all images in the background as soon as the site opens
        images.forEach(src => {
            const preloadImg = new Image();
            preloadImg.src = src;
        });

        let currentIndex = 0;
        const imageElement = document.getElementById('portfolioImage');
        let slideshowTimer;

        function updateImage() {
            if (!imageElement) return; 
            
            // 1. Start fading out the current image
            imageElement.classList.add('fade-out');
            
            // 2. Wait 600ms for the fade-out CSS animation to finish
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % images.length;
                
                // 3. Create a temporary image object in memory
                const tempLoader = new Image();
                
                // 4. WAIT for it to fully load/decode before touching the screen
                tempLoader.onload = () => {
                    imageElement.src = tempLoader.src;
                    imageElement.classList.remove('fade-out'); // Start fade-in safely
                };
                
                // Trigger the load
                tempLoader.src = images[currentIndex];
                
            }, 600);
        }

        function startTimer() {
            clearInterval(slideshowTimer);
            slideshowTimer = setInterval(updateImage, 6000);
        }

        document.getElementById('home-section').addEventListener('click', function() {
            clearInterval(slideshowTimer);
            updateImage();
            startTimer();
        });
        startTimer();

        // --- 2. Page Navigation Logic ---
        function switchPage(targetSectionId) {
            const currentActive = document.querySelector('.page-section.active');
            if (currentActive.id === targetSectionId) return;

            currentActive.classList.remove('active');
            document.getElementById(targetSectionId).classList.add('active');

            // Manage background timers and videos
            if (targetSectionId === 'home-section') {
                startTimer();
            } else {
                clearInterval(slideshowTimer);
            }

            // Clean up states when leaving specific pages
            if (currentActive.id === 'texts-section') { setTimeout(closeText, 600); }
            if (currentActive.id === 'videos-section') { setTimeout(closeVideo, 600); }
        }

        // --- 3. Text Reader Database ---
        const textDatabase = {
            'text1': { title: "The Architecture of Memory", pdfLink: "pdfs/architecture_memory.pdf", filePath: "texts/text_01.html" },
            'text2': { title: "Temporality in Silver Gelatin", pdfLink: "pdfs/temporality.pdf", filePath: "texts/temporality.html" }
        };

        const readerView = document.getElementById('text-reader-view');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const backToTopBtn = document.getElementById('back-to-top');

        function openText(textId) {
            const data = textDatabase[textId];
            document.getElementById('reader-title').innerText = data.title;
            document.getElementById('download-link').href = data.pdfLink;
            document.getElementById('reader-body').innerHTML = "<p>Loading text...</p>";

            fetch(data.filePath)
                .then(response => { if (!response.ok) throw new Error(); return response.text(); })
                .then(html => { document.getElementById('reader-body').innerHTML = html; })
                .catch(error => { document.getElementById('reader-body').innerHTML = `<p style="color:red;">Error loading external file.</p>`; });

            document.getElementById('texts-list-view').style.display = 'none';
            readerView.style.display = 'block';
            progressContainer.style.display = 'block';
            readerView.scrollTop = 0;
        }

        function closeText() {
            readerView.style.display = 'none';
            progressContainer.style.display = 'none';
            document.getElementById('texts-list-view').style.display = 'block';
        }

        readerView.addEventListener('scroll', () => {
            const scrollTop = readerView.scrollTop;
            const scrollHeight = readerView.scrollHeight - readerView.clientHeight;
            progressBar.style.width = ((scrollTop / scrollHeight) * 100) + "%";
            if (scrollTop > 500) { backToTopBtn.classList.add('visible'); } else { backToTopBtn.classList.remove('visible'); }
        });

        function scrollToTop() { readerView.scrollTo({ top: 0, behavior: 'smooth' }); }

        // --- 4. Video Player Logic ---
        let videosDatabase = [];

        // Automatically fetch and build the video list when the website loads
        fetch('videos.json')
            .then(response => response.json())
            .then(data => {
                videosDatabase = data;
                const listContainer = document.getElementById('dynamic-video-list');
                
                // For each video in your JSON file, create a list item
                data.forEach((vid, index) => {
                    const li = document.createElement('li');
                    li.className = 'list-link';
                    // Pass the index (0, 1, 2...) so the computer knows which video was clicked
                    li.onclick = () => openVideo(index);
                    li.innerHTML = `<strong>${vid.title}</strong> - ${vid.year}`;
                    listContainer.appendChild(li);
                });
            })
            .catch(error => console.log("Could not load videos.json. Make sure Live Server is running."));

        function openVideo(index) {
            const vid = videosDatabase[index];
            document.getElementById('video-title').innerText = vid.title;
            
            // This injects the italic medium/year, followed by your formatted description
            document.getElementById('video-description').innerHTML = `
                <p style="font-style: italic; margin-bottom: 20px;">${vid.medium}, ${vid.year}</p>
                ${vid.description}
            `;
            
            const vimeoUrl = `https://player.vimeo.com/video/${vid.vimeoId}?color=ffffff&title=0&byline=0&portrait=0`;
            document.getElementById('vimeo-player').src = vimeoUrl;

            document.getElementById('videos-list-view').style.display = 'none';
            document.getElementById('video-player-view').style.display = 'block';
            document.querySelector('#videos-section .text-content').scrollTop = 0;
        }

        function closeVideo() {
            document.getElementById('video-player-view').style.display = 'none';
            document.getElementById('videos-list-view').style.display = 'block';
            // Wipe the src to stop the video from continuing to play in the background
            document.getElementById('vimeo-player').src = "";
        }
    </script>
</body>
</html>
