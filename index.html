<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugo Cuenot - Artist Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: #ffffff; font-family: "Times New Roman", Times, serif; }
        .container { display: flex; flex-direction: column; height: 100vh; }

        header { display: flex; justify-content: space-between; align-items: center; padding: 25px 50px; background-color: #ffffff; flex-shrink: 0; z-index: 100; }
        h1.site-title { font-family: 'Bebas Neue', sans-serif; font-size: 5.5rem; letter-spacing: 1px; color: #000000; line-height: 0.8; margin-top: 5px; cursor: pointer; }
        nav ul { display: flex; list-style: none; gap: 60px; margin-right: 20px; }
        nav a { text-decoration: none; color: #000000; font-size: 1.1rem; font-weight: 600; transition: opacity 0.2s ease; }
        nav a:hover { opacity: 0.5; }

        .content-area { flex-grow: 1; position: relative; width: 100%; }
        .page-section { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #ffffff; opacity: 0; visibility: hidden; transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out; }
        .page-section.active { opacity: 1; visibility: visible; z-index: 10; }

        #home-section { cursor: pointer; overflow: hidden; }
        #portfolioImage { width: 100%; height: 100%; object-fit: cover; object-position: center; display: block; transition: opacity 0.6s ease-in-out; }
        
        /* Shared fade class for home image and carousel images */
        .fade-out { opacity: 0; }

        .text-content { padding: 50px; max-width: 800px; margin: 0 auto; height: 100%; overflow-y: auto; scrollbar-width: none; }
        .text-content::-webkit-scrollbar { display: none; }
        .text-content h2 { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; margin-bottom: 20px; letter-spacing: 1px; }
        .text-content p, .text-content li { font-size: 1.2rem; line-height: 1.6; margin-bottom: 15px; }
        .work-list { list-style: none; }
        .work-list li { border-bottom: 1px solid #ddd; padding: 15px 0; }

        /* --- Shared UI (Texts, Videos, Works) --- */
        .list-link { cursor: pointer; transition: opacity 0.2s ease; }
        .list-link:hover { opacity: 0.5; }
        
        .reader-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #000; padding-bottom: 15px; }
        .action-btn { background: none; border: none; font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; cursor: pointer; color: #000; text-decoration: none; letter-spacing: 1px; transition: opacity 0.2s ease; }
        .action-btn:hover { opacity: 0.5; }
        .description-text p { margin-bottom: 25px; text-align: justify; }

        /* --- Views Hidden by Default --- */
        #text-reader-view, #video-player-view, #work-detail-view { display: none; position: relative; }

        /* --- Video Specific --- */
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; margin-bottom: 25px; background-color: #000; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        /* --- Carousel Specific (Works) --- */
        .carousel-container {
            position: relative;
            width: 100%;
            margin-bottom: 25px;
            background-color: #f9f9f9; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .carousel-img {
            max-height: 70vh; 
            width: 100%;
            object-fit: contain; 
            display: block;
            transition: opacity 0.4s ease-in-out;
        }
        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent; 
            border: none;
            font-size: 2.5rem; 
            color: #000;
            text-shadow: 0px 0px 8px rgba(255, 255, 255, 0.8);
            cursor: pointer;
            padding: 10px 15px;
            transition: opacity 0.2s ease;
            z-index: 10;
        }
        .carousel-btn:hover {
            opacity: 0.5; 
        }
        .carousel-btn.prev { left: 10px; }
        .carousel-btn.next { right: 10px; }
        .image-counter {
            text-align: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        /* --- Progress Bar & Back to Top --- */
        #progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 4px; background: transparent; z-index: 9999; display: none; }
        #progress-bar { height: 100%; background: #000; width: 0%; transition: width 0.1s; }
        #back-to-top { position: fixed; bottom: 40px; right: 50px; background: #000; color: #fff; border: none; padding: 10px 20px; font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 1px; cursor: pointer; opacity: 0; visibility: hidden; transition: opacity 0.3s; z-index: 100; border-radius: 3px; }
        #back-to-top.visible { opacity: 1; visibility: visible; }

        /* =========================================
           RESPONSIVE DESIGN (Media Queries)
           ========================================= */
        @media (max-width: 900px) {
            header { padding: 20px 30px; }
            h1.site-title { font-size: 4.5rem; }
            nav ul { gap: 30px; margin-right: 0; }
            .text-content { padding: 40px 30px; }
        }

        @media (max-width: 600px) {
            header { flex-direction: column; align-items: flex-start; padding: 15px 20px; }
            h1.site-title { font-size: 3.5rem; margin-bottom: 15px; }
            nav ul { gap: 15px; flex-wrap: wrap; }
            nav a { font-size: 1rem; }
            .text-content { padding: 25px 20px 120px 20px; }
            .text-content h2 { font-size: 2.2rem; }
            .text-content p, .text-content li { font-size: 1.1rem; }
            .reader-controls { flex-direction: column; align-items: flex-start; gap: 15px; }
            .action-btn { font-size: 1.3rem; }
            #back-to-top { bottom: 20px; right: 20px; padding: 8px 15px; font-size: 1rem; }
            
            /* Reduced the size of the arrows for mobile screens */
            .carousel-btn { font-size: 1.5rem; }
            
            #portfolioImage {
                width: calc(100vh - 120px); 
                height: 100vw;      
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%) rotate(-90deg);
                object-fit: cover; 
            }
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <div class="container">
        <header>
            <h1 class="site-title" onclick="switchPage('home-section')">HUGO CUENOT</h1>
            <nav>
                <ul>
                    <li><a href="#" onclick="switchPage('texts-section')">Texts</a></li>
                    <li><a href="#" onclick="switchPage('videos-section')">Videos</a></li>
                    <li><a href="#" onclick="switchPage('work-section')">Works</a></li>
                    <li><a href="#" onclick="switchPage('about-section')">About</a></li>
                    <li><a href="#" onclick="switchPage('cv-section')">CV</a></li>
                </ul>
            </nav>
        </header>

        <main class="content-area">
            
            <section id="home-section" class="page-section active">
                <img id="portfolioImage" src="images/image_01.webp" alt="">
            </section>

            <!-- TEXTS SECTION -->
            <section id="texts-section" class="page-section">
                <div class="text-content" id="texts-list-view">
                    <h2>Selected Texts</h2>
                    <ul class="work-list">
                        <li class="list-link" onclick="openText('text1')"><strong>Star Cruiser</strong> - Speculative Fiction, 2026</li>
                        <li class="list-link" onclick="openText('text2')"><strong>Window Pane</strong> - Fiction, 2026</li>
                        
                    </ul>
                </div>
                <div class="text-content" id="text-reader-view">
                    <div class="reader-controls">
                        <button class="action-btn" onclick="closeText()">← BACK TO LIST</button>
                        <a id="download-link" href="#" download class="action-btn">DOWNLOAD PDF ↓</a>
                    </div>
                    <h2 id="reader-title">Title</h2>
                    <div id="reader-body" class="description-text"></div>
                    <button id="back-to-top" onclick="scrollToTop()">↑ TOP</button>
                </div>
            </section>

            <!-- VIDEOS SECTION -->
            <section id="videos-section" class="page-section">
                <div class="text-content" id="videos-list-view">
                    <h2>Selected Videos</h2>
                    <ul class="work-list" id="dynamic-video-list"></ul>
                </div>
                <div class="text-content" id="video-player-view">
                    <div class="reader-controls"><button class="action-btn" onclick="closeVideo()">← BACK TO LIST</button></div>
                    <h2 id="video-title">Title</h2>
                    <div class="video-wrapper">
                        <iframe id="vimeo-player" src="" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <div id="video-description" class="description-text"></div>
                </div>
            </section>

            <!-- WORK SECTION -->
            <section id="work-section" class="page-section">
                
                <div class="text-content" id="works-list-view">
                    <h2>Selected Works</h2>
                    <ul class="work-list" id="dynamic-work-list"></ul>
                </div>

                <div class="text-content" id="work-detail-view">
                    <div class="reader-controls">
                        <button class="action-btn" onclick="closeWork()">← BACK TO LIST</button>
                    </div>
                    
                    <h2 id="work-title">Title</h2>
                    
                    <div class="carousel-container">
                        <button class="carousel-btn prev" id="carousel-prev" onclick="changeImage(-1)">&#10094;</button>
                        <img id="carousel-main-image" class="carousel-img" src="" alt="Artwork">
                        <button class="carousel-btn next" id="carousel-next" onclick="changeImage(1)">&#10095;</button>
                    </div>
                    
                    <div class="image-counter" id="carousel-counter">1 / 1</div>
                    <div id="work-description" class="description-text"></div>
                </div>
                
            </section>

            <!-- ABOUT & CV -->
            <section id="about-section" class="page-section"><div class="text-content"><h2>About</h2></div></section>
            <section id="cv-section" class="page-section"><div class="text-content"><h2>Curriculum Vitae</h2></div></section>

        </main>
    </div>

    <script>
        // --- 1. Main Slideshow Logic ---
        const images = [
            "images/image_01.webp", "images/image_02.webp", "images/image_03.webp",
            "images/image_04.webp", "images/image_05.webp"
        ];

        images.forEach(src => { const img = new Image(); img.src = src; });
        let currentIndex = 0;
        const imageElement = document.getElementById('portfolioImage');
        let slideshowTimer;

        function updateImage() {
            if (!imageElement) return; 
            imageElement.classList.add('fade-out');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % images.length;
                const tempLoader = new Image();
                tempLoader.onload = () => {
                    imageElement.src = tempLoader.src;
                    imageElement.classList.remove('fade-out');
                };
                tempLoader.src = images[currentIndex];
            }, 600);
        }

        function startTimer() { clearInterval(slideshowTimer); slideshowTimer = setInterval(updateImage, 6000); }
        document.getElementById('home-section').addEventListener('click', function() { clearInterval(slideshowTimer); updateImage(); startTimer(); });
        startTimer();

        // --- 2. Page Navigation ---
        function switchPage(targetSectionId) {
            const currentActive = document.querySelector('.page-section.active');
            if (currentActive.id === targetSectionId) return;

            currentActive.classList.remove('active');
            document.getElementById(targetSectionId).classList.add('active');

            if (targetSectionId === 'home-section') { startTimer(); } 
            else { clearInterval(slideshowTimer); }

            if (currentActive.id === 'texts-section') { setTimeout(closeText, 600); }
            if (currentActive.id === 'videos-section') { setTimeout(closeVideo, 600); }
            if (currentActive.id === 'work-section') { setTimeout(closeWork, 600); }
        }

        // --- 3. Text Logic ---
        const textDatabase = {
            'text2': { title: "Window Pane", pdfLink: "pdfs/architecture_memory.pdf", filePath: "texts/window_pane.html" },
            'text1': { title: "Star Cruiser", pdfLink: "pdfs/temporality.pdf", filePath: "texts/star_cruiser.html" }
        };
        const readerView = document.getElementById('text-reader-view');
        
        function openText(textId) {
            const data = textDatabase[textId];
            document.getElementById('reader-title').innerText = data.title;
            document.getElementById('download-link').href = data.pdfLink;
            document.getElementById('reader-body').innerHTML = "<p>Loading...</p>";
            fetch(data.filePath)
                .then(r => r.text())
                .then(html => { document.getElementById('reader-body').innerHTML = html; });
            document.getElementById('texts-list-view').style.display = 'none';
            readerView.style.display = 'block';
            document.getElementById('progress-container').style.display = 'block';
            readerView.scrollTop = 0;
        }
        function closeText() {
            readerView.style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
            document.getElementById('texts-list-view').style.display = 'block';
        }

        // Progress bar scrolling logic
        [readerView, document.querySelector('#work-detail-view')].forEach(view => {
            view.addEventListener('scroll', (e) => {
                const target = e.target;
                const scrollHeight = target.scrollHeight - target.clientHeight;
                if(scrollHeight > 0) {
                    document.getElementById('progress-bar').style.width = ((target.scrollTop / scrollHeight) * 100) + "%";
                }
                const btn = document.getElementById('back-to-top');
                if (target.scrollTop > 500) { btn.classList.add('visible'); } else { btn.classList.remove('visible'); }
            });
        });
        function scrollToTop() {
            const activeView = document.querySelector('.page-section.active .text-content[style*="display: block"]');
            if(activeView) activeView.scrollTo({ top: 0, behavior: 'smooth' });
        }


        // --- 4. Video Logic ---
        let videosDatabase = [];
        fetch('videos.json')
            .then(r => r.json())
            .then(data => {
                videosDatabase = data;
                const list = document.getElementById('dynamic-video-list');
                data.forEach((vid, index) => {
                    const li = document.createElement('li');
                    li.className = 'list-link';
                    li.onclick = () => openVideo(index);
                    li.innerHTML = `<strong>${vid.title}</strong> - ${vid.year}`;
                    list.appendChild(li);
                });
            }).catch(e => console.log("videos.json not found"));

        function openVideo(index) {
            const vid = videosDatabase[index];
            document.getElementById('video-title').innerText = vid.title;
            document.getElementById('video-description').innerHTML = `<p style="font-style: italic; margin-bottom: 20px;">${vid.medium}, ${vid.year}</p>${vid.description}`;
            document.getElementById('vimeo-player').src = `https://player.vimeo.com/video/${vid.vimeoId}?color=ffffff&title=0&byline=0&portrait=0`;
            document.getElementById('videos-list-view').style.display = 'none';
            document.getElementById('video-player-view').style.display = 'block';
            document.querySelector('#video-player-view').scrollTop = 0;
        }
        function closeVideo() {
            document.getElementById('video-player-view').style.display = 'none';
            document.getElementById('videos-list-view').style.display = 'block';
            document.getElementById('vimeo-player').src = "";
        }


        // --- 5. Works Carousel Logic ---
        let worksDatabase = [];
        let currentWorkImages = [];
        let currentCarouselIndex = 0;

        fetch('works.json')
            .then(r => r.json())
            .then(data => {
                worksDatabase = data;
                const list = document.getElementById('dynamic-work-list');
                data.forEach((work, index) => {
                    const li = document.createElement('li');
                    li.className = 'list-link';
                    li.onclick = () => openWork(index);
                    li.innerHTML = `<strong>${work.title}</strong> - ${work.year}`;
                    list.appendChild(li);
                });
            }).catch(e => console.log("works.json not found"));

        function openWork(index) {
            const work = worksDatabase[index];
            document.getElementById('work-title').innerText = work.title;
            document.getElementById('work-description').innerHTML = `<p style="font-style: italic; margin-bottom: 20px;">${work.medium}, ${work.year}</p>${work.description}`;
            
            work.images.forEach(src => { 
                const img = new Image(); 
                img.src = src; 
            });

            currentWorkImages = work.images;
            currentCarouselIndex = 0;
            
            document.getElementById('carousel-main-image').src = currentWorkImages[currentCarouselIndex];
            document.getElementById('carousel-main-image').classList.remove('fade-out');
            
            updateCarouselDOM();

            document.getElementById('works-list-view').style.display = 'none';
            const detailView = document.getElementById('work-detail-view');
            detailView.style.display = 'block';
            document.getElementById('progress-container').style.display = 'block';
            detailView.scrollTop = 0;
        }

        function changeImage(direction) {
            const carouselImg = document.getElementById('carousel-main-image');
            
            carouselImg.classList.add('fade-out');
            
            setTimeout(() => {
                currentCarouselIndex += direction;
                if (currentCarouselIndex < 0) currentCarouselIndex = currentWorkImages.length - 1;
                if (currentCarouselIndex >= currentWorkImages.length) currentCarouselIndex = 0;
                
                updateCarouselDOM();
                
                carouselImg.classList.remove('fade-out');
            }, 400); 
        }

        function updateCarouselDOM() {
            document.getElementById('carousel-main-image').src = currentWorkImages[currentCarouselIndex];
            document.getElementById('carousel-counter').innerText = `${currentCarouselIndex + 1} / ${currentWorkImages.length}`;
            
            const btnPrev = document.getElementById('carousel-prev');
            const btnNext = document.getElementById('carousel-next');
            if (currentWorkImages.length <= 1) {
                btnPrev.style.display = 'none';
                btnNext.style.display = 'none';
            } else {
                btnPrev.style.display = 'block';
                btnNext.style.display = 'block';
            }
        }

        function closeWork() {
            document.getElementById('work-detail-view').style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
            document.getElementById('works-list-view').style.display = 'block';
        }
    </script>
</body>
</html>
